services:

  server:
    image: datastewardshipwizard/wizard-server:${DSW_VERSION}
    platform: linux/amd64
    restart: always
    # Local demo only; put an HTTPS proxy in front for shared deployments.
    ports:
      - 127.0.0.1:3000:3000
    depends_on:
      - postgres
      - garage
    volumes:
      - ./config/application.yml:/app/config/application.yml:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    # Keep runtime S3 values in .env so they stay aligned with Garage bootstrap.
    environment:
      S3_URL: ${S3_URL}
      S3_USERNAME: ${S3_USERNAME}
      S3_PASSWORD: ${S3_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}

  client:
    image: datastewardshipwizard/wizard-client:${DSW_VERSION}
    restart: always
    # Local demo only; put an HTTPS proxy in front for shared deployments.
    ports:
      - 127.0.0.1:8080:8080
    environment:
      API_URL: http://localhost:3000/wizard-api

  garage-ui:
    image: noooste/garage-ui:${GARAGE_UI_VERSION}
    restart: always
    # Local admin UI only; do not expose this directly in a public deployment.
    ports:
      - 127.0.0.1:${GARAGE_UI_PORT}:8080
    depends_on:
      - garage
    volumes:
      - ./config/garage-ui.yaml:/app/config.yaml:ro
    environment:
      GARAGE_UI_SERVER_ROOT_URL: http://localhost:${GARAGE_UI_PORT}
      GARAGE_UI_GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_UI_AUTH_ADMIN_USERNAME: ${GARAGE_UI_ADMIN_USERNAME}
      GARAGE_UI_AUTH_ADMIN_PASSWORD: ${GARAGE_UI_ADMIN_PASSWORD}

  plugin-proxy:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - 127.0.0.1:9004:8080
    depends_on:
      - garage
    volumes:
      - ./config/plugin-proxy.conf:/etc/nginx/conf.d/default.conf:ro

  docworker:
    image: datastewardshipwizard/document-worker:${DSW_VERSION}
    restart: always
    depends_on:
      - postgres
      - garage
      - server
    volumes:
      - ./config/application.yml:/app/config/application.yml:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    # Keep runtime S3 values in .env so they stay aligned with Garage bootstrap.
    environment:
      S3_URL: ${S3_URL}
      S3_USERNAME: ${S3_USERNAME}
      S3_PASSWORD: ${S3_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}

  mailer:
    image: datastewardshipwizard/mailer:${DSW_VERSION}
    restart: always
    depends_on:
      - postgres
      - server
    volumes:
      - ./config/application.yml:/app/config/application.yml:ro

  postgres:
    image: postgres:${POSTGRES_VERSION}
    restart: always
    # Local debug access only.
    ports:
      - 127.0.0.1:5432:5432
    # Change defaults before using this outside a local POC.
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Uncomment one option below to persist PostgreSQL data locally.
    # volumes:
    #   - db-data:/var/lib/postgresql/data
    # OR
    #   - ./db-data/data:/var/lib/postgresql/data

  garage:
    image: dxflrs/garage:${GARAGE_VERSION}
    restart: always
    # Publish Garage on the host so both containers and the browser can reach the same endpoint.
    # Do not expose this directly in a public deployment.
    ports:
      - 9000:3900
      - 9002:3902
      - 9003:3903
    # Change these defaults before sharing or reusing this setup.
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN}
    volumes:
      - ./config/garage.toml:/etc/garage.toml:ro
      # Uncomment to persist Garage state between local restarts.
      # - ./garage-data:/var/lib/garage

# volumes:
#   db-data:
